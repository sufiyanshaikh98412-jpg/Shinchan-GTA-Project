<!DOCTYPE html>
<html>
<head>
    <title>Shin-chan GTA Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; }
        #ad-board { position: absolute; top: 0; width: 100%; height: 40px; background: yellow; text-align: center; line-height: 40px; font-weight: bold; z-index: 100; border-bottom: 2px solid #000; font-family: sans-serif; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; background: rgba(255,0,0,0.6); border-radius: 50%; z-index: 100; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 3px solid white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="ad-board">$$ MONEY ZONE - ADS HERE $$</div>
    <div id="controls">RUN</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Blue Sky
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights (Isse black screen nahi hogi)
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Road (Grey Floor)
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x444444}));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Shin-chan Character (Simple Model)
        const charGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), new THREE.MeshStandardMaterial({color: 0xFF0000}));
        body.position.y = 0.8;
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.5), new THREE.MeshStandardMaterial({color: 0xFFDBAC}));
        head.position.y = 1.5;
        const pants = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.4), new THREE.MeshStandardMaterial({color: 0xFFFF00}));
        pants.position.y = 0.3;
        charGroup.add(body, head, pants);
        scene.add(charGroup);

        camera.position.set(0, 4, 8);
        camera.lookAt(charGroup.position);

        let walking = false;
        const btn = document.getElementById('controls');
        btn.addEventListener('touchstart', () => walking = true);
        btn.addEventListener('touchend', () => walking = false);

        function animate() {
            requestAnimationFrame(animate);
            if(walking) {
                charGroup.position.z -= 0.15; // Speed
                camera.position.z -= 0.15; // Follow
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
