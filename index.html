<!DOCTYPE html>
<html>
<head>
    <title>Shin-chan 3D Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; }
        #ad-board { position: absolute; top: 0; width: 100%; height: 50px; background: yellow; text-align: center; line-height: 50px; font-weight: bold; z-index: 100; border-bottom: 2px solid #000; }
        #controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 150px; height: 150px; background: rgba(255,255,255,0.3); border-radius: 50%; z-index: 100; display: flex; align-items: center; justify-content: center; font-family: Arial; font-weight: bold; color: white; }
    </style>
</head>
<body>
    <div id="ad-board">ADVERTISING BOARD - MONEY ZONE</div>
    <div id="controls">TOUCH TO MOVE</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x228B22}));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), new THREE.MeshStandardMaterial({color: 0xFF0000}));
        body.position.y = 0.8;
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.5), new THREE.MeshStandardMaterial({color: 0xFFDBAC}));
        head.position.y = 1.5;
        const shorts = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.3, 0.42), new THREE.MeshStandardMaterial({color: 0xFFFF00}));
        shorts.position.y = 0.4;
        group.add(body, head, shorts);
        scene.add(group);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));

        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        let move = false;
        window.addEventListener('touchstart', () => move = true);
        window.addEventListener('touchend', () => move = false);

        function animate() {
            requestAnimationFrame(animate);
            if(move) {
                group.position.z -= 0.05; 
                camera.position.z -= 0.05;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
